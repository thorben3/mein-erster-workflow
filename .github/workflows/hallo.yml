name: Hallo Welt

on:
  push:
  workflow_dispatch:
    inputs:
      name:
        description: "Wen soll ich begrüßen?"
        required: true
        default: "Welt"

jobs:
  sag-hallo:
    runs-on: ubuntu-latest
    steps:
      - name: Begrüßung
        run: echo "Hallo, ${{ inputs.name }}!"

      - name: Datum und Uhrzeit
        run: date

      - name: Welche Maschine?
        run: |
          echo "Betriebssystem:"
          uname -a
          echo ""
          echo "Aktuelles Verzeichnis:"
          pwd

      - name: Verfügbare Tools prüfen
        run: |
          git --version
          docker --version
          python3 --version
          node --version